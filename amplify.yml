version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*

customRules:
  # 1. Regla Proxy para WordPress (Soluciona el CORS)
  - source: '/wp-proxy/<*>'
    target: 'https://www.srg.com.co/<*>'
    status: '200'
  # 2. (Opcional pero recomendada) Regla SPA para React Router
  # Asegura que si recargas la página en una ruta como /admin/migration, no te dé error 404.
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
    target: '/index.html'
    status: '200'